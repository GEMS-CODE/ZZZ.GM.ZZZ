const fairy={
  x:W/2,y:H/2,
  tx:W/2,ty:H/2,
  vx:0,vy:0,
  targetTimer:0,targetDur:rnd(5000,9000),
  wobble:0,wobbleSpd:rnd(0.0012,0.002),
  float:0,floatSpd:rnd(0.0008,0.0015),
  size:0.053,
};

function updateFairy(dt){
  fairy.wobble+=fairy.wobbleSpd*dt;
  fairy.float+=fairy.floatSpd*dt;
  fairy.targetTimer+=dt;
  if(fairy.targetTimer>fairy.targetDur){
    fairy.targetTimer=0;fairy.targetDur=rnd(5000,10000);
    fairy.tx=rnd(W*0.15,W*0.85);
    fairy.ty=rnd(H*0.12,H*0.85);
  }
  const dx=fairy.tx-fairy.x,dy=fairy.ty-fairy.y;
  fairy.vx+=(dx*0.00005-fairy.vx*0.015)*dt*0.06;
  fairy.vy+=(dy*0.00005-fairy.vy*0.015)*dt*0.06;
  fairy.x+=fairy.vx*dt*0.06;
  fairy.y+=fairy.vy*dt*0.06;
  fairy.y+=Math.sin(fairy.float)*0.25;
}

function drawFairy(){
  const S=fairy.size;
  const wobX=Math.sin(fairy.wobble)*3;
  const wobY=Math.sin(fairy.wobble*0.7)*2;
  const flip=fairy.vx<-0.1?-1:1;
  const svgCX=VB.x+VB.w/2;
  const svgCY=VB.y+VB.h*0.35;

  ctx.save();
  ctx.translate(fairy.x+wobX,fairy.y+wobY);
  ctx.scale(flip*S,S);
  ctx.translate(-svgCX,-svgCY);

  ctx.save();
  ctx.translate(svgCX,svgCY);
  const glowR=5000; 
  const glow=ctx.createRadialGradient(0,0,50,0,0,glowR);
  glow.addColorStop(0,'rgba(201,149,42,0.033)');
  glow.addColorStop(0.3,'rgba(201,149,42,0.015)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(0,0,glowR,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.fillStyle='rgba(201,149,42,0.05)';
  ctx.strokeStyle='rgba(201,149,42,0.33)';
  ctx.lineWidth=1.5/S;
  ctx.shadowBlur=15/S;
  ctx.shadowColor='rgba(201,149,42,0.4)';
  ctx.fill(fairyPath1);
  ctx.stroke(fairyPath1);
  ctx.fillStyle='rgba(201,149,42,0.05)';
  ctx.strokeStyle='rgba(201,149,42,0.1)';
  ctx.lineWidth=1.5/S;
  ctx.fill(fairyPath2);
  ctx.stroke(fairyPath2);

  ctx.restore();
}

function makeNote(){
  const angle=rnd(0,Math.PI*2);
  const r=rnd(20,80);
  return {
    ch:pick(CHARS),
    x:fairy.x+Math.cos(angle)*r,
    y:fairy.y+Math.sin(angle)*r,
    vx:rnd(-0.5,0.5),
    vy:rnd(-0.8,-0.1), 
    sz:rnd(18,26),
    alpha:0,
    life:0,
    lifeSpd:rnd(0.00015,0.0003),
    rot:rnd(-0.3,0.3),
    rotV:rnd(-0.004,0.004),
  };
}

const notes=Array.from({length:8},makeNote);

function updateNotes(dt,t){
  notes.forEach(n=>{
    n.life+=n.lifeSpd*dt;
    n.x+=n.vx*dt*0.06;
    n.y+=n.vy*dt*0.06;
    n.vx+=rnd(-0.002,0.002);
    n.rot+=n.rotV*dt*0.06;

    const fi=Math.min(1,n.life/0.12);
    const fo=Math.min(1,(1-n.life)/0.15);
    n.alpha=rnd(0.2,0.45)*Math.min(fi,fo);
    n.alpha=Math.max(0,n.alpha);

    if(n.life>=1){
      const angle=rnd(0,Math.PI*2);
      const r=rnd(20,100);
      n.x=fairy.x+Math.cos(angle)*r;
      n.y=fairy.y+Math.sin(angle)*r;
      n.vx=rnd(-0.5,0.5);
      n.vy=rnd(-0.8,-0.1);
      n.life=0;
      n.lifeSpd=rnd(0.00015,0.0003);
      n.ch=pick(CHARS);
      n.sz=rnd(18,26);
      n.rotV=rnd(-0.004,0.004);
    }
  });
}

function drawNotes(){
  notes.forEach(n=>{
    if(n.alpha<0.01)return;
    ctx.save();ctx.translate(n.x,n.y);ctx.rotate(n.rot);
    ctx.globalAlpha=n.alpha;
    ctx.font=`${n.sz}px serif`;ctx.fillStyle=GOLD;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n.ch,0,0);ctx.restore();
  });
}

function makeStar(){

    y:fairy.y+Math.sin(angle)*r,

}

    s.alphaPh+=s.alphaSpd*dt;
    s.szPh+=s.szSpd*dt;
    s.x+=s.vx*dt*0.06;
    s.y+=s.vy*dt*0.06;
    s.rot+=s.rotV*dt*0.06;

    const sparkle=Math.pow(Math.abs(Math.sin(s.alphaPh)),2);
    const fi=Math.min(1,s.life/0.1);
    const fo=Math.min(1,(1-s.life)/0.1);
    s.alpha=s.alphaPeak*0.5*sparkle*Math.min(fi,fo);

    s.szCurrent=s.sz*(0.8+0.2*Math.sin(s.szPh));

    if(s.life>=1){

      const angle=rnd(0,Math.PI*2);
      const r=rnd(40,200);
      s.x=fairy.x+Math.cos(angle)*r;
      s.y=fairy.y+Math.sin(angle)*r;
      s.life=0;
      s.lifeSpd=rnd(0.00008,0.00018);
      s.alphaPeak=rnd(0.25,0.6);
      s.alphaSpd=rnd(0.003,0.009);
      s.alphaPh=rnd(0,Math.PI*2);
      s.vx=rnd(-0.2,0.2);
      s.vy=rnd(-0.2,0.2);
      s.sz=rnd(8,16);
    }
  });
}

function drawStars(){
  stars.forEach(s=>{
    if(s.alpha<0.01)return;

    ctx.save();ctx.translate(s.x,s.y);
    const g=ctx.createRadialGradient(0,0,0,0,0,s.szCurrent*2.5);
    g.addColorStop(0,`rgba(80,200,120,${s.alpha*0.4})`);
    g.addColorStop(1,'rgba(80,200,120,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(0,0,s.szCurrent*2.5,0,Math.PI*2);ctx.fill();

    ctx.rotate(s.rot);
    ctx.globalAlpha=s.alpha;
    ctx.font=`${s.szCurrent}px serif`;ctx.fillStyle=STAR_COLOR;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✦',0,0);ctx.restore();
  });
}

const trail=[];
function updateTrail(){
  if(Math.hypot(fairy.vx,fairy.vy)>0.2){
    trail.push({x:fairy.x,y:fairy.y,life:1});
  }
  if(trail.length>36)trail.shift();
  trail.forEach(p=>p.life-=0.006);
}
function drawTrail(){
  trail.forEach(p=>{
    if(p.life<0)return;

    const r=p.life*27+5;        // life=1→48px, life=0→8px
    const a=p.life*0.05;        // life=1→0.05, life=0→0
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    g.addColorStop(0,`rgba(201,149,42,${a})`);
    g.addColorStop(0.5,`rgba(201,149,42,${a*0.4})`);
    g.addColorStop(1,'rgba(201,149,42,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
  });
}

let lastTime=0;
function loop(ts){
  const dt=Math.min(ts-lastTime,40);lastTime=ts;
  ctx.clearRect(0,0,W,H);
  drawDust(ts);
  updateFairy(dt);
  updateTrail();
  updateNotes(dt,ts);
  updateStars(dt,ts);
  drawTrail();
  drawStars();
  drawNotes();
  drawFairy();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(loop);});

</script>
